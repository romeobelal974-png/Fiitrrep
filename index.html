<!doctype html>

 <head><script src="/_sdk/telemetry_sdk.js"></script>

    html, body { height: 100%; margin: 0; padding: 0; }

    .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 12px 20px; border-radius: 8px; color: #fff; animation: slideIn 0.3s ease; }
    .toast-success { background: #10b981; }
    .toast-error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }

    .logo-img { max-height: 50px; width: auto; object-fit: contain; }
    .hero-logo-img { max-height: 150px; width: auto; object-fit: contain; margin: 0 auto; }
  </style>

  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full w-full bg-zinc-950 text-white overflow-auto">
  <div id="app" class="w-full h-full"></div>
  <script>
    let allData = { users: [], categories: [], videos: [], branding: [], subscriptions: [], passwordRequests: [], banners: [], favorites: [] };
    let subscriptionMap = {};
    const ADMIN_USER = 'Ramadan';
    const ADMIN_PASS = 'Poiuy8995';
    let currentUser = null;
    let currentView = 'landing';
    let adminTab = 'dashboard';
    let isLoading = false;

    const dataHandler = {
      onDataChanged(data) {
        allData = { users: [], categories: [], videos: [], branding: [], subscriptions: [], passwordRequests: [], banners: [], favorites: [] };
        data.forEach(item => {
          if (item.type === 'user') allData.users.push(item);
          else if (item.type === 'category') allData.categories.push(item);
          else if (item.type === 'video') allData.videos.push(item);
          else if (item.type === 'branding') allData.branding.push(item);
          else if (item.type === 'subscription') allData.subscriptions.push(item);
          else if (item.type === 'passwordRequest') allData.passwordRequests.push(item);
          else if (item.type === 'banner') allData.banners.push(item);
          else if (item.type === 'favorite') allData.favorites.push(item);
        });
        subscriptionMap = {};
        allData.subscriptions.forEach(s => { subscriptionMap[s.username] = s; subscriptionMap[s.phone] = s; });
        render();
      }
    };

    function toast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function render() {
      const app = document.getElementById('app');
      if (!app) return;
      try {
        switch (currentView) {
          case 'landing': app.innerHTML = renderLanding(); break;
          case 'login': app.innerHTML = renderLogin(); break;
          case 'register': app.innerHTML = renderRegister(); break;
          case 'browse': app.innerHTML = renderBrowse(); break;
          case 'favorites': app.innerHTML = renderFavorites(); break;
          case 'admin': app.innerHTML = renderAdmin(); break;
          case 'admin-login': app.innerHTML = renderAdminLogin(); break;
          case 'forgot-password': app.innerHTML = renderForgotPassword(); break;
          default: app.innerHTML = renderLanding();
        }
        lucide.createIcons();
        loadVideoThumbnails();
        bindEvents();
      } catch (err) {
        console.error('Render error:', err);
        app.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444"><h2>Error Loading Page</h2><p>' + err.message + '</p></div>';
      }
    }

      const isAdmin = currentUser && currentUser.username === ADMIN_USER;

    function renderBrowse() {
      const sub = subscriptionMap[currentUser.phone];
      const daysRemaining = sub ? Math.ceil((new Date(sub.expiresAt) - new Date()) / (1000 * 60 * 60 * 24)) : 0;
      const isExpired = daysRemaining <= 0;
      const userFavorites = allData.favorites.filter(f => f.user_phone === currentUser.phone);
      const showFavoritesTab = userFavorites.length > 0;
      
      return `${renderNav()}
      <div class="px-4 sm:px-8 py-8 max-w-6xl mx-auto">

            <p class="text-emerald-400 font-bold text-lg">${daysRemaining} Days</p>

    function getVideoThumbnail(video) {
      if (video.url.includes('youtube.com') || video.url.includes('youtu.be')) {
        const youtubeId = video.url.includes('youtube.com') 
          ? video.url.split('v=')[1]?.split('&')[0]
          : video.url.split('youtu.be/')[1]?.split('?')[0];
        return `https://img.youtube.com/vi/${youtubeId}/maxresdefault.jpg`;
      }
      if (video.url.includes('vimeo.com')) {
        return 'vimeo-loading';
      }
      return 'frame-loading';
    }

    function generateVideoThumbnail(videoId, videoUrl) {
      const thumbElement = document.getElementById(`thumb-${videoId}`);
      if (!thumbElement) return;

      const video = document.createElement('video');
      video.crossOrigin = 'anonymous';
      video.preload = 'metadata';
      video.muted = true;
      video.playsInline = true;

      video.onloadedmetadata = () => {
        video.currentTime = 1;
      };

      video.onseeked = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1280;
        canvas.height = 720;
        const ctx = canvas.getContext('2d');
        
        if (ctx) {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const thumbnailUrl = canvas.toDataURL('image/jpeg', 0.8);
          
          thumbElement.innerHTML = `<img src="${thumbnailUrl}" alt="Video thumbnail" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/30 group-hover:bg-black/50 transition flex items-center justify-center">
              <div class="bg-emerald-500 rounded-full p-3 group-hover:bg-emerald-400 transition">
                <i data-lucide="play" class="w-6 h-6 text-white fill-white"></i>
              </div>
            </div>`;
          lucide.createIcons();
        }
      };

      video.onerror = () => {
        thumbElement.innerHTML = `<div class="w-full h-full bg-gradient-to-br from-zinc-700 to-zinc-800 flex items-center justify-center">
          <div class="text-center">
            <i data-lucide="video" class="w-12 h-12 text-zinc-600 mx-auto mb-2"></i>
            <p class="text-xs text-zinc-600">Unable to load preview</p>
          </div>
        </div>`;
        lucide.createIcons();
      };

      video.src = videoUrl;
    }

    function videoCard(v) {
      const thumbnail = getVideoThumbnail(v);
      const isYoutube = v.url.includes('youtube.com') || v.url.includes('youtu.be');
      const isVimeo = v.url.includes('vimeo.com');
      const isDirectVideo = !isYoutube && !isVimeo;
      
      let thumbnailHtml = '';
      if (isYoutube) {
        const youtubeId = v.url.includes('youtube.com') 
          ? v.url.split('v=')[1]?.split('&')[0]
          : v.url.split('youtu.be/')[1]?.split('?')[0];

    async function activateSubscription(phone) {
      if (isLoading) return;
      const planSelect = document.getElementById(`plan-select-${phone}`);
      const plan = planSelect.value;
      if (!plan) { toast('Please select a plan', 'error'); return; }

      let expiryDate = new Date();
      if (plan === 'basic') expiryDate.setMonth(expiryDate.getMonth() + 1);
      else if (plan === 'premium') expiryDate.setMonth(expiryDate.getMonth() + 3);
      else if (plan === 'elite') expiryDate.setFullYear(expiryDate.getFullYear() + 1);
      else if (plan === 'custom') {
        const customDays = parseInt(document.getElementById(`days-input-${phone}`).value);
        const customDate = document.getElementById(`expiry-date-${phone}`).value;
        if (customDate) {
          expiryDate = new Date(customDate);
        } else if (customDays > 0) {
          expiryDate.setDate(expiryDate.getDate() + customDays);
        } else {
          toast('Please enter days or select a date', 'error');
          return;
        }
      }

      isLoading = true;
      let existingSub = subscriptionMap[phone];
      let result;
      
      if (existingSub) {
        const updated = { ...existingSub, subscription_plan: plan, subscription_active: 'true', expiresAt: expiryDate.toISOString() };
        result = await window.dataSdk.update(updated);
      } else {
        result = await window.dataSdk.create({ 
          type: 'subscription', 
          phone: phone, 
          username: phone,
          subscription_plan: plan, 
          subscription_active: 'true', 
          activatedAt: new Date().toISOString(),
          expiresAt: expiryDate.toISOString()
        });
      }
      
      isLoading = false;
      if (result.isError) { toast('Failed to activate subscription', 'error'); return; }
      toast('Subscription activated!');
      document.getElementById(`sub-modal-${phone}`).classList.add('hidden');
      render();
    }

    async function deactivateSubscription(phone) {
      if (isLoading) return;
      isLoading = true;
      const sub = subscriptionMap[phone];
      if (!sub) { isLoading = false; return; }
      const updated = { ...sub, subscription_active: 'false' };
      const result = await window.dataSdk.update(updated);
      isLoading = false;
      if (result.isError) { toast('Failed to deactivate subscription', 'error'); return; }
      toast('Subscription deactivated');
      document.getElementById(`sub-modal-${phone}`).classList.add('hidden');
      render();
    }

      const loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.onsubmit = (e) => {
          e.preventDefault();
          const phone = document.getElementById('l-phone').value.trim();
          const pass = document.getElementById('l-pass').value;
          const user = allData.users.find(u => u.phone === phone && u.password === pass && u.status === 'approved');
          if (!user) { toast('Invalid credentials or not approved', 'error'); return; }
          
          const sub = subscriptionMap[phone];
          if (!sub || sub.subscription_active !== 'true' || new Date(sub.expiresAt) < new Date()) {
            toast('Your subscription is inactive or expired', 'error');
            return;
          }
          
          currentUser = { username: user.name, phone: user.phone };
          currentView = 'browse';
          toast(`Welcome, ${user.name}!`);
          render();
        };
      }

      const adminLoginForm = document.getElementById('admin-login-form');
      if (adminLoginForm) {
        adminLoginForm.onsubmit = (e) => {
          e.preventDefault();
          const u = document.getElementById('a-user').value.trim();
          const p = document.getElementById('a-pass').value;
          if (u === ADMIN_USER && p === ADMIN_PASS) {
            currentUser = { username: ADMIN_USER };
            currentView = 'admin';
            toast('Welcome, Admin!');
            render();
            return;
          }
          toast('Invalid credentials', 'error');
        };
      }

      const regForm = document.getElementById('reg-form');
      if (regForm) {
        regForm.onsubmit = async (e) => {
          e.preventDefault();
          const name = document.getElementById('r-name').value.trim();
          const phone = document.getElementById('r-phone').value.trim();
          const pass = document.getElementById('r-pass').value;
          const pass2 = document.getElementById('r-pass2').value;
          if (!name || !phone || pass.length < 6 || pass !== pass2) { toast('Invalid input', 'error'); return; }
          if (allData.users.find(u => u.phone === phone)) { toast('Phone already registered', 'error'); return; }
          isLoading = true;
          const result = await window.dataSdk.create({ type: 'user', name: name, phone: phone, password: pass, status: 'pending' });
          isLoading = false;
          if (result.isError) { toast('Registration failed', 'error'); return; }
          toast('Registration submitted! Awaiting approval.');
          currentView = 'login';
          render();
        };
      }

      const catForm = document.getElementById('cat-form');
      if (catForm) {
        catForm.onsubmit = async (e) => {
          e.preventDefault();
          const name = document.getElementById('cat-name').value.trim();
          if (!name) return;
          await createCategory(name);
          document.getElementById('cat-name').value = '';
          render();
        };
      }

      const vidForm = document.getElementById('vid-form');
      if (vidForm) {
        vidForm.onsubmit = async (e) => {
          e.preventDefault();
          const title = document.getElementById('vid-title').value.trim();
          const url = document.getElementById('vid-url').value.trim();
          const catId = document.getElementById('vid-cat').value;
          if (!title || !url || !catId) return;
          await createVideo(title, url, catId);
          document.getElementById('vid-title').value = '';
          document.getElementById('vid-url').value = '';
          render();
        };
      }

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.oninput = (e) => {
          const q = e.target.value.toLowerCase();
          const content = document.getElementById('browse-content');
          if (!content) return;
          const filtered = q ? allData.videos.filter(v => v.title.toLowerCase().includes(q)) : allData.videos;
          content.innerHTML = filtered.map(v => videoCard(v)).join('') || '<p class="text-zinc-500">No videos found</p>';
          lucide.createIcons();
        };
      }

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('bg-emerald-600', 'text-white'));
          btn.classList.add('bg-emerald-600', 'text-white');
          const catId = btn.dataset.cat;
          const content = document.getElementById('browse-content');
          if (!content) return;
          const filtered = catId === 'all' ? allData.videos : allData.videos.filter(v => v.category === catId);
          content.innerHTML = filtered.map(v => videoCard(v)).join('');
          lucide.createIcons();
        };
      });

      document.querySelectorAll('select[id^="plan-select-"]').forEach(select => {
        select.onchange = (e) => {
          const phone = e.target.id.split('-')[2];
          const customDiv = document.getElementById(`custom-days-${phone}`);
          if (e.target.value === 'custom') {
            customDiv.classList.remove('hidden');
          } else {
            customDiv.classList.add('hidden');
          }
        };
      });

      animateCounters();
    }

    function animateCounters() {
      document.querySelectorAll('.stat-counter').forEach(el => {
        const target = parseInt(el.dataset.target);
        let current = 0;
        const increment = Math.ceil(target / 100);
        const interval = setInterval(() => {
          current += increment;
          if (current >= target) { current = target; clearInterval(interval); }
          el.textContent = current.toLocaleString();
        }, 20);
      });
    }

    function toggleLanguage() {
      const isArabic = localStorage.getItem('isArabic') === 'true';
      localStorage.setItem('isArabic', isArabic ? 'false' : 'true');
      render();
    }

    async function toggleFavorite(videoId, videoTitle) {
      if (isLoading) return;
      isLoading = true;
      
      const existingFavorite = allData.favorites.find(f => f.video_id === videoId && f.user_phone === currentUser.phone);
      
      if (existingFavorite) {
        const result = await window.dataSdk.delete(existingFavorite);
        isLoading = false;
        if (result.isError) { toast('Failed to remove from favorites', 'error'); return; }
        toast('Removed from favorites');
      } else {
        const result = await window.dataSdk.create({
          type: 'favorite',
          video_id: videoId,
          user_phone: currentUser.phone,
          favorite: 'true'
        });
        isLoading = false;
        if (result.isError) { toast('Failed to add to favorites', 'error'); return; }
        toast(`Added "${videoTitle}" to favorites!`);
      }
      render();
    }

    const defaultConfig = { hero_tagline: 'Train Smart. Watch. Learn.', logo_url: 'https://i.postimg.cc/XN25zxCG/1000234956-removebg-preview.png' };
    let config = { ...defaultConfig };

    async function initSDK() {
      if (!window.elementSdk) return;
      try {
        await window.elementSdk.init({
          defaultConfig,
          onConfigChange: (c) => {
            config = c;
            const el = document.getElementById('hero-tagline');
            if (el && c.hero_tagline) el.textContent = c.hero_tagline;
            
            const logoImg = document.querySelector('.logo-img');
            const heroLogoImg = document.querySelector('.hero-logo-img');
            if (c.logo_url) {
              if (logoImg) logoImg.src = c.logo_url;
              if (heroLogoImg) heroLogoImg.src = c.logo_url;
            }
          },
          mapToCapabilities: (c) => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
          mapToEditPanelValues: (c) => new Map([
            ['hero_tagline', c.hero_tagline || defaultConfig.hero_tagline],
            ['logo_url', c.logo_url || defaultConfig.logo_url]
          ])
        });
      } catch (err) {
        console.error('Element SDK error:', err);
      }
    }

    async function start() {
      try {
        render();
        await initSDK();
        await initDataSDK();
      } catch (err) {
        console.error('Start error:', err);
      }
    }

    start();
  </script>
